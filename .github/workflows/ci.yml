name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck update_all_clis.sh install.sh scripts/ci_fixture.sh scripts/agentmail_send_update_summary.sh scripts/hermes_cron_daily_update_example.sh

  fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fixture smoke test
        run: bash scripts/ci_fixture.sh
